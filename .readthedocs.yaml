version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - libpango-1.0-0
    - libharfbuzz0b
    - libpangoft2-1.0-0
    - libffi-dev
    - libjpeg-dev
    - libopenjp2-7-dev
  jobs:
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/pdf/
      - cp site/algebra-begleiter.pdf $READTHEDOCS_OUTPUT/pdf/ || true

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: requirements.txt
