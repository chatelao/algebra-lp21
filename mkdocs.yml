site_name: Algebra-Begleiter
theme:
  name: material
  language: de
  features:
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - with-pdf:
      output_path: algebra-begleiter.pdf
      ordered_chapter_level: 2

nav:
  - Home: index.md
  - Lektionen:
    - 1. Variablen und Terme: 01_variablen_und_terme.md
    - 2. Terme vereinfachen: 02_terme_vereinfachen.md
    - 3. Das Distributivgesetz: 03_distributivgesetz.md
    - 4. Negative Zahlen: 04_negative_zahlen.md
    - 5. Gleichungen lösen: 05_gleichungen_loesen.md
    - 6. Terme auswerten: 07_terme_auswerten.md
    - 7. Textaufgaben: 08_textaufgaben.md
    - 8. Proportionalität: 09_proportionalitaet.md
    - 9. Geometrie: 10_geometrie.md
    - 10. Primzahlen & Teilbarkeit: 11_primzahlen_und_teilbarkeit.md
    - 11. Brüche & Dezimalzahlen: 12_brueche_und_dezimalzahlen.md
    - 12. Prozentrechnen: 13_prozentrechnen.md
    - 13. Potenzen: 14_potenzen.md
    - 14. Zehnerpotenzen: 15_zehnerpotenzen.md
    - 15. Koordinatensystem: 16_koordinatensystem.md
    - 16. Zuordnungen & Graphen: 17_zuordnungen_und_graphen.md
    - 17. Statistik & Daten: 18_statistik_und_daten.md
    - 18. Wahrscheinlichkeit: 19_wahrscheinlichkeit.md
    - 19. Prismen & Volumen: 20_prismen_und_volumen.md
  - Übungen:
    - Übersicht: 06_uebungsaufgaben.md
    - 1. Variablen & Terme: uebungen/01_variablen.md
    - 2. Vereinfachen: uebungen/02_vereinfachen.md
    - 3. Distributivgesetz: uebungen/03_distributiv.md
    - 4. Negative Zahlen: uebungen/04_negative_zahlen.md
