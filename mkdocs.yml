    - 6. Terme auswerten: uebungen/07_auswerten.md
    - 7. Textaufgaben: uebungen/08_textaufgaben.md
    - 8. Proportionalität: uebungen/09_proportionalitaet.md
    - 9. Geometrie: uebungen/10_geometrie.md
    - 10. Primzahlen: uebungen/11_primzahlen.md
    - 11. Brüche: uebungen/12_brueche.md
    - 12. Prozent: uebungen/13_prozent.md
    - 13. Potenzen: uebungen/14_potenzen.md
